apiVersion: v1
kind: Pod
metadata:
  name: dev-shell
spec:
  containers:
    - name: dev-shell
      image: marcpaulthecoder/stockalgo:latest
      command: ["sleep", "infinity"]
      env:
        - name: POLARIS_URI
          value: "http://polaris.polaris.svc.cluster.local:8181/api/catalog"
        - name: MINIO_ENDPOINT
          value: "http://minio.minio.svc.cluster.local:9000"
        - name: POLARIS_CREDS
          valueFrom:
            secretKeyRef:
              name: polaris-creds
              key: KEY
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: minio-access-key
              key: KEY
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-secret-key
              key: KEY
      volumeMounts:
        - mountPath: /app
          name: fastdata
  volumes:
    - name: fastdata
      persistentVolumeClaim:
        claimName: fast-nfs-pvc
