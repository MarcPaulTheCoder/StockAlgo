apiVersion: v1
kind: PersistentVolume
metadata:
 name: fast-nfs-pv
 labels:
   type: nfs-model-storage
spec:
 capacity:
   storage: 1Ti
 accessModes:
   - ReadWriteMany
 persistentVolumeReclaimPolicy: Retain
 mountOptions:
   - nconnect=8
 nfs:
   server: "192.168.20.13"
   path: "/mnt/fast/workspaces/stockAlgo"
