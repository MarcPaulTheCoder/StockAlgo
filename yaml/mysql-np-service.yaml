apiVersion: v1
kind: Service
metadata:
  name: mysql-np-service
spec:
  type: NodePort
  selector:
    app: mysql
    statefulset.kubernetes.io/pod-name: mysql-0
  ports:
    - port: 8999
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-np-reader-service
spec:
  type: NodePort
  externalTrafficPolicy: Cluster
  selector:
    app: mysql
    statefulset.kubernetes.io/pod-name: mysql-1
  ports:
    - port: 31222
      targetPort: 3306
      nodePort: 32378
