apiVersion: v1
kind: Service
metadata:
  name: mysql-np-service
spec:
  type: NodePort
  selector:
    app: mysql
    role: primary
  ports:
    - port: 8999
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-np-reader-service
spec:
  type: NodePort
  externalTrafficPolicy: Cluster
  selector:
    app: mysql
    role: secondary
  ports:
    - port: 31222
      targetPort: 3306
      nodePort: 32378
