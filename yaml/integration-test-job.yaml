apiVersion: batch/v1
kind: Job
metadata:
  name: stockalgo-integration-tests
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: nfs-stockalgo
          nfs:
            server: 192.168.20.13
            path: /mnt/fast/workspaces/stockAlgo
      containers:
        - name: pytest
          image: marcpaulthecoder/stockalgo:latest
          imagePullPolicy: Always
          workingDir: /app
          volumeMounts:
            - name: nfs-stockalgo
              mountPath: /app
          command: ["bash", "-c"]
          args:
            - export PYTHONPATH="/opt/spark/python:$(ls /opt/spark/python/lib/py4j-*-src.zip)" &&
              pip install -q pytest &&
              pip install -q -e . &&
              pytest -m integration -v
          env:
            - name: POLARIS_URI
              value: "http://polaris.polaris.svc.cluster.local:8181/api/catalog"
            - name: MINIO_ENDPOINT
              value: "http://minio.minio.svc.cluster.local:9000"
            - name: POLARIS_CREDS
              valueFrom:
                secretKeyRef:
                  name: polaris-creds
                  key: KEY
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-access-key
                  key: KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret-key
                  key: KEY
