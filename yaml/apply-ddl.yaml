apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: iceberg-table-creation
  namespace: default
spec:
  type: Python
  mainApplicationFile: local:///mnt/data/pyspark/apply_ddl.py
  sparkVersion: "4.0.0"
  mode: cluster
  image: marcpaulthecoder/stockalgo:latest
  imagePullPolicy: Always
  volumes:
    - name: nfs-stockalgo
      nfs:
        server: 192.168.20.13
        path: /mnt/fast/workspaces/stockAlgo
  sparkConf:
    "spark.sql.extensions": "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    "spark.sql.catalog.stockalgo": "org.apache.iceberg.spark.SparkCatalog"
    "spark.sql.catalog.stockalgo.type": "rest"
    "spark.sql.catalog.stockalgo.uri": "http://polaris.polaris.svc.cluster.local:8181/api/catalog"
    "spark.sql.catalog.stockalgo.credential": "<POLARIS_CREDENTIAL>"
    "spark.sql.catalog.stockalgo.warehouse": "stockalgo"
    "spark.sql.catalog.stockalgo.scope": "PRINCIPAL_ROLE:ALL"
    "spark.sql.catalog.stockalgo.io-impl": "org.apache.iceberg.aws.s3.S3FileIO"
    "spark.sql.catalog.stockalgo.s3.endpoint": "http://minio.minio.svc.cluster.local:9000"
    "spark.sql.catalog.stockalgo.s3.path-style-access": "true"
    "spark.sql.catalog.stockalgo.s3.access-key-id": "<S3_ACCESS_KEY>"
    "spark.sql.catalog.stockalgo.s3.secret-access-key": "<S3_SECRET_KEY>"
    "spark.sql.defaultCatalog": "stockalgo"
  driver:
    cores: 1
    memory: "2g"
    serviceAccount: spark-release-spark-operator-spark
    volumeMounts:
      - name: nfs-stockalgo
        mountPath: /mnt/data
  executor:
    cores: 1
    memory: "2g"
    instances: 1
    volumeMounts:
      - name: nfs-stockalgo
        mountPath: /mnt/data
